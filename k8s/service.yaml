# IE2: Service de Kubernetes — expone el microservicio al exterior
apiVersion: v1
kind: Service
metadata:
  name: rentcar-service
  namespace: rentcar
  labels:
    app: rentcar-backend
spec:
  selector:
    app: rentcar-backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer  # En GKE asigna IP externa automáticamente
