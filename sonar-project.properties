# IE5: Configuración de SonarCloud para RentCar EP3
sonar.projectKey=TU_ORG_rentcar
sonar.organization=TU_ORG_SONARCLOUD
sonar.projectName=RentCar EP3 DevOps
sonar.projectVersion=1.0.0

# Fuentes y tests
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# IE5: Reporte de cobertura generado por JaCoCo
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusiones (no analizar código generado)
sonar.exclusions=**/model/**,**/*Application.java
sonar.coverage.exclusions=**/model/**,**/*Application.java,**/repository/**

# Encoding
sonar.sourceEncoding=UTF-8
